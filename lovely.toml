target = "main.lua"
pattern = '--Demo save update code'
position = "before"
payload = '''
if fonts.fusionPixel8 and savedata.options.language == 'zh_cn'  then
	fonts.fusionPixel8:setLineHeight(0.75)
	fonts.main = fonts.fusionPixel8

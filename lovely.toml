[[patches]]
[patches.pattern]
target = "states/Menu.lua"
pattern = '''
		self.optionsMenu:addOption('optionsJokes',function()
			self.jokesData = helpers.copytable(savedata.aprilFools,2)
			self.optionsMenu:setSubmenu('jokes')
		end,optionsHeight*6)
'''
position = "at"
payload = '''
		self.optionsMenu:addOption('optionsJokes',function()
			self.jokesData = helpers.copytable(savedata.aprilFools,2)
			self.optionsMenu:setSubmenu('jokes')
		end,optionsHeight*7)
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "main.lua"
pattern = 'loc.load("data/localization.json")'
position = "after"
payload = '''

	-- 加载自定义中文翻译
	do
		local lovely = require("lovely")
		local newLanguage = 'zh-cn'
		local chsLocPath = lovely.mod_dir .. "/ChsMod/localization.json"
		print("Loading " .. newLanguage .. " localization from: " .. chsLocPath)
		
		local chsLocFile = io.open(chsLocPath, "r")
		if chsLocFile then
			local chsLocJson = json.decode(chsLocFile:read("*all"))
			chsLocFile:close()
			
			if chsLocJson then
				local count = 0
				for k, v in pairs(loc.json) do
					if chsLocJson[k] and chsLocJson[k][newLanguage] then
						loc.json[k][newLanguage] = chsLocJson[k][newLanguage]
						count = count + 1
					else
						loc.json[k][newLanguage] = loc.json[k]['en']
					end
				end
					loc.json['lang_' .. newLanguage] = {}
					for k, v in pairs(loc.json.optionsLanguage) do
						loc.json['lang_' .. newLanguage][k] = chsLocJson['lang_' .. newLanguage][newLanguage]
					end
				print(newLanguage .. " localization merged! Keys: " .. count)
			else
				print("Failed to decode custom JSON")
			end
		else
			print("Custom localization file not found")
		end
	end
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "preload/fonts.lua"
pattern = 'fonts.main:setLineHeight(0.75)'
position = "before"
payload = '''
-- 加载中文字体
print("=== Loading Chinese Font ===")
local lovely = require("lovely")
local chineseFontPath = lovely.mod_dir .. "/ChsMod/"
local chineseFontList = {
	fusionPixel8 = {fontFileName = "fusion-pixel-8px-proportional-zh_hans.ttf", fontSize = 8},
	fusionPixel12 = {fontFileName = "fusion-pixel-12px-proportional-zh_hans.ttf", fontSize = 12},
	changBanDianSong = {fontFileName = "ChangBanDianSong-16-SC.ttf", fontSize = 16}
}
print("Font path: " .. chineseFontPath)

for fontName, fontInfo in pairs(chineseFontList) do
	local fontFile = io.open(chineseFontPath .. fontInfo.fontFileName, "rb")
	if fontFile then
		local fontData = fontFile:read("*all")
		fontFile:close()
		print(fontInfo.fontFileName .. " read, size: " .. #fontData .. " bytes")

		local writeSuccess = love.filesystem.write(fontInfo.fontFileName, fontData)

		if writeSuccess then
			print(fontInfo.fontFileName .. " copied to love filesystem")

			local loadSuccess, loadedFont = pcall(love.graphics.newFont, fontInfo.fontFileName, fontInfo.fontSize)

			if loadSuccess then
				fonts[fontName] = loadedFont
				print(fontInfo.fontFileName .. " loaded successfully!")
			else
				print("ERROR: Failed to load font: " .. tostring(loadedFont))
			end
		else
			print("ERROR: Failed to write " .. fontInfo.fontFileName .. " to love filesystem")
		end
	else
		print("ERROR: Could not open " .. fontInfo.fontFileName)
	end
end

if fonts.changBanDianSong then fonts.changBanDianSong:setLineHeight(1.1) end
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "main.lua"
pattern = '--Demo save update code'
position = "before"
payload = '''
if fonts.fusionPixel8 and savedata.options.language == 'zh-cn'  then
	fonts.fusionPixel8:setLineHeight(0.75)
	fonts.main = fonts.fusionPixel8
elseif fonts.fusionPixel8 then
	fonts.main:setFallbacks(fonts.fusionPixel8)
end
if fonts.fusionPixel12 and savedata.options.language == 'zh-cn' then
	fonts.fusionPixel12:setLineHeight(0.75)
	fonts.digitalDisco = fonts.fusionPixel12
	fonts.jfdot2 = fonts.fusionPixel12
elseif fonts.fusionPixel12 then
	fonts.digitalDisco:setFallbacks(fonts.fusionPixel12, fonts.jfdot)
end
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "states/IntroWarnings.lua"
pattern = "love.graphics.setFont(fonts.jfdot)"
position = "at"
payload = '''
if fonts.fusionPixel12 and savedata.options.language == 'zh-cn' then
	love.graphics.setFont(fonts.fusionPixel12)
else
	love.graphics.setFont(fonts.jfdot)
end
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "states/IntroWarnings.lua"
pattern = "rtf:drawRich(loc.get(locString),project.res.cx,320,fonts.jfdot,2,2,1,project.res.x,'center')"
position = "at"
payload = '''
if fonts.fusionPixel12 and savedata.options.language == 'zh-cn' then
	rtf:drawRich(loc.get(locString),project.res.cx,320,fonts.fusionPixel12,2,2,1,project.res.x,'center')
else
	rtf:drawRich(loc.get(locString),project.res.cx,320,fonts.jfdot,2,2,1,project.res.x,'center')
end
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "states/Fishing.lua"
pattern = "love.graphics.setFont(fonts.ancient)"
position = "at"
payload = '''
if fonts.changBanDianSong and savedata.options.language == 'zh-cn' then
	love.graphics.setFont(fonts.changBanDianSong)
else
	love.graphics.setFont(fonts.ancient)
end
'''
match_indent = true
times = 1

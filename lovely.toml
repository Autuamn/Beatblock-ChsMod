[manifest]
version = "2.1"
priority = 0

[[patches]]
[patches.pattern]
target = "states/NewOptionsMenu.lua"
pattern = 'local data = dpf.loadJson("data/optionsMenuItems.json")'
position = "after"
payload = 'data.options["language"] = dpf.loadJson("Mods/ChsMod/optionsMenuItems.json")["options"]["language"]'
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "preload/sprites.lua"
pattern = "return sprites"
position = "before"
payload = "sprites.optionsMenu['language'] = love.graphics.newImage('Mods/ChsMod/icons/language.png')"
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "main.lua"
pattern = 'loc.load("data/localization.json")'
position = "after"
payload = '''
-- 加载自定义中文翻译
print("=== Loading Chinese Localization ===")
local newLanguage = 'zh_cn'
if love.filesystem.exists('Mods/ChsMod') then
	local chsLocJson = dpf.loadJson("Mods/ChsMod/localization.json", {})

	if chsLocJson then
		local count = 0
		for k, v in pairs(loc.json) do
			if chsLocJson[k] and chsLocJson[k][newLanguage] then
				loc.json[k][newLanguage] = chsLocJson[k][newLanguage]
				count = count + 1
			else
				loc.json[k][newLanguage] = loc.json[k]['en']
			end
		end
		loc.json['lang_' .. newLanguage] = {}
		for k, v in pairs(loc.json.optionsLanguage) do
			loc.json['lang_' .. newLanguage][k] = chsLocJson['lang_' .. newLanguage][newLanguage]
		end
		loc.json["optionsFontMode"] = {en = "Font Mode", zh_cn = "字体模式"}
		loc.json["fontModeHint"] = {
			en = "Works only in Simplified Chinese, and requires a game restart to take effect.\n\"Replace\" will replace the main font with 'Fusion Pixel';\n\"Set Fallback\" will use 'Fusion Pixel' when the main font lacks characters;\nDue to a bug in the LOVE2D engine, using 'Set Fallback' may sometimes cause issues such as mixed sorting.",
			zh_cn = "主要字体（main 和 digitalDisco）的处理方式，需要重启游戏才能生效。\n“替换”会将主要字体替换为“缝合像素字体”；\n“设置回退”会在主要字体缺少字符时使用“缝合像素字体”；\n由于 LOVE2D 引擎的 bug，使用“设置回退”有时会导致中英文排序混乱等错误。"
		}
		loc.json["enumFontModeReplace"] = {en = "Replace", zh_cn = "替换"}
		loc.json["enumFontModeFallback"] = {en = "Set Fallback", zh_cn = "设置回退"}
		print(newLanguage .. " localization merged! Keys: " .. count)
	else
		print("Failed to decode Json: ".. locPath)
	end
else
	print("ERROR: 'Mods/ChsMod' folder not exists!")
end
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "preload/fonts.lua"
pattern = 'fonts.censorblock:setFallbacks(fonts.terminal)'
position = "after"
payload = '''
-- 加载中文字体
print("=== Loading Chinese Font ===")
if love.filesystem.exists('Mods/ChsMod') then
	local chineseFontList = {
		fusionPixel8 = {fontFileName = "fusion-pixel-8px-proportional-zh_hans.ttf", fontSize = 8},
		fusionPixel12 = {fontFileName = "fusion-pixel-12px-proportional-zh_hans.ttf", fontSize = 12},
		changBanDianSong = {fontFileName = "ChangBanDianSong-16-SC.ttf", fontSize = 16},
		unifont = {fontFileName = "unifont-17.0.04.otf", fontSize = 16},
	}
	for fontName, fontInfo in pairs(chineseFontList) do
		local pathToFontFile = "Mods/ChsMod/fonts/" .. fontInfo.fontFileName
		if love.filesystem.exists(pathToFontFile) then
			print("Loading font: " .. fontInfo.fontFileName)

			local loadSuccess, loadedFont = pcall(love.graphics.newFont, pathToFontFile, fontInfo.fontSize)
			if loadSuccess then
				fonts[fontName] = loadedFont
				print("Loaded successfully: " .. fontInfo.fontFileName)
			else
				print("ERROR: Failed to load font: " .. tostring(loadedFont))
			end
		else
			print("ERROR: Font file not exists: " .. pathToFontFile)
		end
	end

	fonts['fusionPixel12Glitched'] = love.graphics.newImageFont('Mods/ChsMod/fonts/fp12Garbage.png', '介地弹反侧挑额联返连！击回动外战击向跳雷绍', 1)
	fonts['fusionPixel8Glitched'] = love.graphics.newImageFont('Mods/ChsMod/fonts/fp8Garbage.png', '精准度', 1)
	fonts['boutiqueBitmap7'] = love.graphics.newImageFont('Mods/ChsMod/fonts/BoutiqueBitmap7x7.png', '连接至“”失败…正在尝试加载备份我们上了吗？很好。那么，就让一起来测你能力的极限吧即便最后关头蹒跚不前也应该为自己取得进步而感到慰藉惜切代价要将事情行底渴望是这所有人联系现见识下形态', 1)
	fonts['terminal2'] = love.graphics.newImageFont('assets/fonts/terminal.png', pixelArtCharacterMapFull, 2)

	if fonts.changBanDianSong then fonts.changBanDianSong:setLineHeight(1.1) end

	fonts.digitalDiscoGlitched:setFallbacks(fonts.fusionPixel12Glitched)
	fonts.mainGlitched:setFallbacks(fonts.fusionPixel8Glitched)
	fonts.terminal:setFallbacks(fonts.boutiqueBitmap7)
	fonts.terminal2:setFallbacks(fonts.boutiqueBitmap7)
else
	print("ERROR: 'Mods/ChsMod' folder not exists!")
end
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "main.lua"
pattern = '--Demo save update code'
position = "before"
payload = '''
if savedata.options.language == 'zh_cn' then
	if savedata.options.fontMode == 'replace' then
		if fonts.fusionPixel8 then
			fonts.fusionPixel8:setLineHeight(0.75)
			fonts.main = fonts.fusionPixel8
		end
		if fonts.fusionPixel12 then
			fonts.fusionPixel12:setLineHeight(0.75)
			fonts.digitalDisco = fonts.fusionPixel12
			fonts.jfdot = fonts.fusionPixel12
		end
	else
		if fonts.fusionPixel8 then
			fonts.main:setFallbacks(fonts.fusionPixel8)
		end
		if fonts.fusionPixel12 then
			fonts.digitalDisco:setFallbacks(fonts.fusionPixel12)
			fonts.jfdot = fonts.fusionPixel12
		end
	end
	if fonts.unifont then
		fonts.jfdot2 = fonts.unifont
	end
end
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "states/Fishing.lua"
pattern = "love.graphics.setFont(fonts.ancient)"
position = "at"
payload = '''
if fonts.changBanDianSong and savedata.options.language == 'zh_cn' then
	love.graphics.setFont(fonts.changBanDianSong)
else
	love.graphics.setFont(fonts.ancient)
end
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "states/intros/TerabyteIntro.lua"
pattern = """
		love.graphics.rectangle('fill',
			rtf:getBoundingRect(finaltext, project.res.x / 2, project.res.y / 2 - 20, fonts.terminal, 1, 1, -1, 'center'))
		rtf:drawRich(finaltext, project.res.x / 2, project.res.y / 2 - 20, fonts.terminal, 1, 1, { 0, 255, 0, 1 }, -1,
			'center')
"""
position = "at"
payload = '''
local fontToUse = fonts.terminal
if savedata.options.language == 'zh_cn' then fontToUse = fonts.terminal2 end
love.graphics.rectangle('fill', rtf:getBoundingRect(finaltext, project.res.x / 2, project.res.y / 2 - 20, fontToUse, 1, 1, -1, 'center'))
rtf:drawRich(finaltext, project.res.x / 2, project.res.y / 2 - 20, fontToUse, 1, 1, { 0, 255, 0, 1 }, -1, 'center')
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "states/intros/TerabyteIntro.lua"
pattern = "for i = 1, #text do"
position = "at"
payload = "for i = 1, utf8.len(text) do"
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "lib/rtf.lua"
pattern = "local rtf = {"
position = "before"
payload = '''
local unbreakCharacterMap =
	"!\"#$%&'()*+,-./0123456789:;<=>?@ABCDEFGHIJKLMNOPQRSTUVWXYZ\\[]^_`" ..
	"abcdefghijklmnopqrstuvwxyz{}~¡¢£¤¥¦§¨©ª«¬？®¯°±²³´µ¶·¸¹º»¼½¾¿" ..
	"ÀÁÂÃÄÅÆÇÈÉÊËÌÍÎÏÐÑÒÓÔÕÖ×ØÙÚÛÜÝÞßàáâãäåæçèéêëìíîïðñòóôõö÷øùúûüýþÿΩ" ..
	"（“【《"

local unbreakSymbolMap = "。，！？、…—）”】》"

'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "lib/rtf.lua"
pattern = "function rtf:update(dt)"
position = "before"
payload = '''
function rtf:isUnbreakChar(char)
	if not char or char == '' then return false end
	if string.find(unbreakCharacterMap, char, 1, true) then return true end
	return false
end

function rtf:followingUnbreakSym(text, startPos, chrOffset)
	chrOffset = chrOffset + 1
	local chr = rtf.sub(text, startPos + chrOffset, startPos + chrOffset)
	if startPos + chrOffset <= utf8.len(text) and chr then
		if string.find(unbreakSymbolMap, chr, 1, true) then return true end
	end
	return false
end

'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "lib/rtf.lua"
pattern = "word = word .. chr"
position = "after"
payload = "if not(self:isUnbreakChar(chr)) and not(self:followingUnbreakSym(text, startPos, chrOffset)) then brk = true end"
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "lib/rtf.lua"
pattern = "elseif l == ' ' and wrapLen > 0 then*"
position = "at"
payload = "elseif not(self:isUnbreakChar(l)) and wrapLen > 0 then"
match_indent = true
times = 3

[[patches]]
[patches.pattern]
target = "lib/rtf.lua"
pattern = "if l == ' ' and wrapLen > 0 then"
position = "at"
payload = "if not(self:isUnbreakChar(l)) and wrapLen > 0 then"
times = 1
match_indent = true


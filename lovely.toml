times = 1

[[patches]]
[patches.pattern]
target = "states/Menu.lua"
pattern = '''
		self.optionsMenu:addOption('optionsJokes',function()
			self.jokesData = helpers.copytable(savedata.aprilFools,2)
			self.optionsMenu:setSubmenu('jokes')
		end,optionsHeight*6)
'''
position = "at"
payload = '''
		self.optionsMenu:addOption('optionsJokes',function()
			self.jokesData = helpers.copytable(savedata.aprilFools,2)
			self.optionsMenu:setSubmenu('jokes')
		end,optionsHeight*7)
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "main.lua"
pattern = 'loc.load("data/localization.json")'
position = "after"
payload = '''

	-- 加载自定义中文翻译
	do
		local lovely = require("lovely")
		local newLanguage = 'zh-cn'
		local chsLocPath = lovely.mod_dir .. "/ChsMod/localization.json"
		print("Loading " .. newLanguage .. " localization from: " .. chsLocPath)
		
		local chsLocFile = io.open(chsLocPath, "r")
		if chsLocFile then
			local chsLocJson = json.decode(chsLocFile:read("*all"))
			chsLocFile:close()
			
			if chsLocJson then
				local count = 0
				for k, v in pairs(loc.json) do
					if chsLocJson[k] and chsLocJson[k][newLanguage] then
						loc.json[k][newLanguage] = chsLocJson[k][newLanguage]
						count = count + 1
					else
						loc.json[k][newLanguage] = loc.json[k]['en']
					end
				end
					loc.json['lang_' .. newLanguage] = {}
					for k, v in pairs(loc.json.optionsLanguage) do
						loc.json['lang_' .. newLanguage][k] = chsLocJson['lang_' .. newLanguage][newLanguage]
				end
				print(newLanguage .. " localization merged! Keys: " .. count)
			else
				print("Failed to decode custom JSON")
			end
		else
			print("Custom localization file not found")
		end
	end
'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "preload/fonts.lua"
pattern = 'fonts = {'
position = "before"
payload = '''
-- 加载中文字体
print("=== Loading Chinese Font ===")
local lovely = require("lovely")
local custom_font_path = lovely.mod_dir .. "/ChsMod/chs_font.ttf"
print("Font path: " .. custom_font_path)

local font_file = io.open(custom_font_path, "rb")
local custom_main_font = nil

if font_file then
	local font_data = font_file:read("*all")
	font_file:close()
	print("Font file read, size: " .. #font_data .. " bytes")
	
	local write_success = love.filesystem.write("custom_chinese_font.ttf", font_data)
	
	if write_success then
		print("Font copied to love filesystem")
		
		local load_success, loaded_font = pcall(love.graphics.newFont, "custom_chinese_font.ttf", 16)
		
		if load_success then
			custom_main_font = loaded_font
			print("Chinese font loaded successfully!")
		else
			print("ERROR: Failed to load font: " .. tostring(loaded_font))
		end
	else
		print("ERROR: Failed to write font to love filesystem")
	end
else
	print("ERROR: Could not open font file")
end

if not custom_main_font then
	print("Falling back to default font")
	custom_main_font = love.graphics.newFont("assets/fonts/Axmolotl.ttf", 16)
end

'''
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "preload/fonts.lua"
pattern = 'main = love.graphics.newFont*Axmolotl.ttf*, 16*'
position = "at"
payload = 'main = custom_main_font,'
match_indent = true
times = 1

[[patches]]
[patches.pattern]
target = "preload/fonts.lua"
pattern = 'digitalDisco = love.graphics.newFont*DigitalDisco-Thin.ttf*, 16*'
position = "at"
payload = 'digitalDisco = custom_main_font,'
match_indent = true
times = 1
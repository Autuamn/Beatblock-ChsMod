	fonts.main:setFallbacks(fonts.fusionPixel8)
end
if fonts.fusionPixel12 and savedata.options.language == 'zh_cn' then
	fonts.fusionPixel12:setLineHeight(0.75)
	fonts.digitalDisco = fonts.fusionPixel12
	fonts.jfdot2 = fonts.fusionPixel12
elseif fonts.fusionPixel12 then
	fonts.digitalDisco:setFallbacks(fonts.fusionPixel12, fonts.jfdot)
end
'''
match_indent = true
times = 1

